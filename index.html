<!DOCTYPE html>
<html>
<head>
<title>AIBuilderZone</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

input{
width:80%;
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
font-size:16px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
margin-top:10px;
cursor:pointer;
}

iframe{
width:100%;
height:400px;
border:none;
margin-top:30px;
background:white;
}
</style>
</head>

<body>

<h1>AIBuilderZone</h1>
<p>Describe the app you want</p>

<input id="prompt" placeholder="Create a calculator app">

<br>

<button onclick="buildApp()">Build App</button>

<iframe id="preview"></iframe>

<script>

function buildApp(){

let prompt=document.getElementById("prompt").value;

let code="";

if(prompt.includes("calculator")){

code=`
<h2>Calculator</h2>
<input id="a">
+
<input id="b">
<button onclick="calc()">=</button>
<p id="r"></p>

<script>
function calc(){
let a=Number(document.getElementById('a').value)
let b=Number(document.getElementById('b').value)
document.getElementById('r').innerText=a+b
}
</script>
`

}

else if(prompt.includes("todo")){

code=`
<h2>Todo App</h2>
<input id="task">
<button onclick="add()">Add</button>
<ul id="list"></ul>

<script>
function add(){
let t=document.getElementById('task').value
let li=document.createElement('li')
li.innerText=t
document.getElementById('list').appendChild(li)
}
</script>
`

}

else{

code="<h2>AI will support this app soon</h2>"

}

document.getElementById("preview").srcdoc=code

}

</script>

</body>
</html>
